common_settings:
  dataset_file: "data/eval_data.json"
  num_samples: 200
  seed: 42
  output_csv: "results/experiment_metrics.csv"

experiments:
  - name: "FP16_Baseline"
    model_path: "model/my_lora_merged_model"
    backend: "transformers"
    quantization: null
    max_new_tokens: 256
    temperature: 0.0

  - name: "W4A16_Quantized"
    model_path: "model/my_lora_merged_model"
    backend: "transformers"
    quantization: "4bit"
    max_new_tokens: 256
    temperature: 0.0

  - name: "vLLM_Accelerated"
    model_path: "model/my_lora_merged_model"
    backend: "vllm"
    gpu_memory_utilization: 0.9
    max_new_tokens: 256
    temperature: 0.0
