app:
  interactive:
    enabled: true
    show_viewer: false
  state_injection:
    enable_instruction_to_action: true
    enable_instruction_to_motion: true
  inference:
    mode: local
    max_retries: 3
    sleep_seconds: 0.0
    local:
      model_path: model/qwen2.5-3b-top18-rank8-merged
      backend: transformers
      quantization: null
      max_model_len: 2048
      gpu_memory_utilization: 0.8
      trust_remote_code: true
      enable_prefix_caching: true
      prefix_cache_max_entries: 8
      generation:
        temperature: 0.0
        top_p: 1.0
        max_new_tokens: 256

exp13_sim_success:
  dataset_file: data_prepare/splits/test.json
  num_samples: 20
  seed: 42
  reports_dir: experiments/17_exp13_sim_success/reports
  report_json: experiments/17_exp13_sim_success/reports/sim_success_report.json
  summary_csv: experiments/17_exp13_sim_success/reports/sim_success_summary.csv
  summary_md: experiments/17_exp13_sim_success/reports/sim_success_summary.md
  samples_json: experiments/17_exp13_sim_success/reports/sim_success_samples.json
  stop_on_error: false
