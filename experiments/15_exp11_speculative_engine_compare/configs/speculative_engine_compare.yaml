target_model_path: "../../model/qwen2.5-3b-genesis-merged"
assistant_model_path: "../../model/qwen2.5-0.5b-genesis-merged"
target_adapter_path: null
assistant_adapter_path: null
dataset_path: "../../data_prepare/splits/test.json"
num_samples: 50
batch_size: 1
max_new_tokens: 256
max_model_len: 512
temperature: 0.0
warmup_samples: 5
assistant_num_tokens: 8
assistant_confidence_threshold: 0.55
assistant_num_tokens_schedule: "constant"
prefer_same_gpu: true
preferred_cuda_device: 0
allow_auto_device_map_fallback: true
report_path: "reports/speculative_engine_compare_report.json"
trust_remote_code: true
prefer_flash_attention_2: true

backends: "vllm,transformers"
decoding_modes: "standard,speculative"
experiment_profile: "exp8_aligned"
vllm_dtype: "float16"
vllm_gpu_memory_utilization: 0.9
vllm_enforce_eager: true
vllm_enable_prefix_caching: false
post_case_sleep_seconds: 10
