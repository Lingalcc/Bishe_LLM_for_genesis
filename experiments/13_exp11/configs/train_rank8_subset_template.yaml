### model
model_name_or_path: model/Qwen_Qwen2.5-3B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 32
lora_dropout: 0.05
# 该字段会在 run_exp11_ablation.py 中被自动改写为指定层集合对应的模块列表。
lora_target: all

### dataset
dataset: genesis_franka_toolcall_train
template: qwen
cutoff_len: 1024
max_samples: 2000
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: output/exp13_exp11_ablation/top18_rank8
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
max_grad_norm: 1.0

### eval
val_size: 0.05
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 50
